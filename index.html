<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdFab - Education Fabrication Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f0f0;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      padding: 2rem;
      max-width: 640px;
    }

    h1 {
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .description {
      font-size: 1.15rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: #111;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.85rem 2.5rem;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EdFab</h1>
    <p class="description">
      EdFab is an <b>education fabrication lab</b> — a space where learning
      experiences are designed, prototyped, and built from the ground up.
    </p>
    <span class="badge">hello@edfab.org</span>
  </div>
</body>
</html>
